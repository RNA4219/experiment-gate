# Experiment Gate Default Configuration

gate:
  scoring:
    weights:
      impact: 1.0
      feasibility: 1.0
      learning_value: 1.0
      reusability: 0.8
      time_to_signal: 0.8
      dependency_risk: 1.0
      operational_risk: 1.0
      novelty: 0.6
    thresholds:
      go_min: 70
      hold_min: 45
  decision:
    require_minimum_evidence: true
    allow_go_with_major_unknowns: false
